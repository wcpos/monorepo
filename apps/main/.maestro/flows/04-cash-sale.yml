appId: com.wcpos.main.dev
env:
  PRODUCT_SEARCH: Beanie
---
# P0-4: core cash sale — Products → Cart → checkout → back to a fresh order.
# Session comes from 02-auth-setup; do NOT clear state.
- launchApp:
    stopApp: true
- extendedWaitUntil:
    visible:
      id: "search-products"
    timeout: 120000
# Phone layout splits Products/Cart into tabs; tablet shows both columns.
- runFlow:
    when:
      visible:
        id: "pos-tab-products"
    commands:
      - tapOn:
          id: "pos-tab-products"
- tapOn:
    id: "search-products"
- inputText: ${PRODUCT_SEARCH}
- extendedWaitUntil:
    visible:
      id: "product-tile"
    timeout: 30000
- tapOn:
    id: "product-tile"
    index: 0
- hideKeyboard
- runFlow:
    when:
      visible:
        id: "pos-tab-cart"
    commands:
      - tapOn:
          id: "pos-tab-cart"
- extendedWaitUntil:
    visible:
      id: "cart-subtotal"
    timeout: 30000
- assertVisible:
    id: "checkout-button"
- tapOn:
    id: "checkout-button"
- extendedWaitUntil:
    visible:
      id: "checkout-dialog"
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: "process-payment-button"
    timeout: 60000
- tapOn:
    id: "process-payment-button"
# Receipt appears once the (cash) payment completes.
- extendedWaitUntil:
    visible:
      id: "receipt-close-button"
    timeout: 120000
- tapOn:
    id: "receipt-close-button"
# Back on the POS with a fresh order.
- extendedWaitUntil:
    visible:
      id: "search-products"
    timeout: 60000
