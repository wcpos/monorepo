# Maestro workspace for the WCPOS native E2E suite (P0).
# Spec: wayfinder map wcpos/monorepo#688 handoff spec.
# The suite is deliberately stateful: 02 authenticates once (real OAuth
# against the dev-pro store) and every later flow reuses the SQLite-persisted
# session, so execution order is pinned explicitly — Maestro's default flow
# order is non-deterministic.
flows:
  - flows/*.yml
executionOrder:
  continueOnFailure: false
  flowsOrder:
    - 01-clean-launch-connect
    - 02-auth-setup
    - 03-authenticated-relaunch
    - 04-cash-sale
    - 05-drawer-navigation
    - 06-cart-quantity-editing
    - 07-void-order
