# Maestro workspace for the WCPOS native E2E suite (P0).
# Spec: wayfinder map wcpos/monorepo#688 handoff spec.
# Flows run in the order below: 02 authenticates once (real OAuth against
# the dev-pro store); every later flow reuses the SQLite-persisted session
# and must NOT clear state.
flows:
  - flows/01-clean-launch-connect.yml
  - flows/02-auth-setup.yml
  - flows/03-authenticated-relaunch.yml
  - flows/04-cash-sale.yml
  - flows/05-drawer-navigation.yml
  - flows/06-cart-quantity-editing.yml
  - flows/07-void-order.yml
executionOrder:
  continueOnFailure: false
