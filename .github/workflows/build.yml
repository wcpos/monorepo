name: Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build for (all/android/ios)
        type: choice
        required: true
        default: all
        options:
          - all
          - android
          - ios
      profile:
        description: EAS build profile (development/production)
        type: choice
        required: true
        default: development
        options:
          - development
          - production
          - adhoc
      submit:
        description: Auto submit to the store? (production only)
        type: boolean
        required: false
      apk:
        description: Sideloadable Android APK -> monorepo release (no/attach/only)
        type: choice
        required: true
        default: 'no'
        options:
          - 'no'
          - attach
          - only

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏗 Setup repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: 🏗 Setup monorepo
        uses: ./.github/actions/setup-monorepo
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}
          rxdb-license-key: ${{ secrets.RXDB_LICENSE_KEY }}
          uniwind-auth-token: ${{ secrets.UNIWIND_AUTH_TOKEN }}

      - name: 👷 Build packages for main
        run: pnpm run -w build:main

      - name: 🚀 Build main
        if: ${{ (github.event.inputs.submit == 'false' || github.event.inputs.profile != 'production') && github.event.inputs.apk != 'only' }}
        working-directory: apps/main
        run: eas build --non-interactive --wait --platform=${{ github.event.inputs.platform }} --profile=${{ github.event.inputs.profile }}

      - name: 🚀 Build & submit main
        if: ${{ github.event.inputs.submit == 'true' && github.event.inputs.profile == 'production' && github.event.inputs.apk != 'only' }}
        working-directory: apps/main
        run: eas build --non-interactive --wait --auto-submit --platform=${{ github.event.inputs.platform }} --profile=${{ github.event.inputs.profile }}

      # Sideloadable Android APK: build a universal, installable .apk (production-apk
      # profile) and attach it to the monorepo release for the current app version so
      # customers without Play Store access can install manually.
      # NOTE: signed with the EAS upload key, NOT Google's Play app-signing key, so it
      # cannot update over a Play install (different signature) — a separate install track.
      - name: 🤖 Build & upload sideload APK
        if: ${{ github.event.inputs.apk == 'attach' || github.event.inputs.apk == 'only' }}
        working-directory: apps/main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          eas build --non-interactive --wait --platform=android --profile=production-apk --json > apk-build.json
          apk_url="$(jq -r '.[0].artifacts.applicationArchiveUrl // empty' apk-build.json)"
          if [ -z "$apk_url" ]; then
            echo "::error::Could not resolve APK artifact URL from EAS output"; cat apk-build.json; exit 1
          fi
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          apk="WCPOS-${version}.apk"
          echo "Downloading APK for ${tag} from ${apk_url}"
          curl -fSL "$apk_url" -o "$apk"
          file "$apk" || true
          # Require the release to already exist — never create one here, so a dispatch
          # from a commit that doesn't match this version cannot publish a bogus release.
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release ${tag} does not exist. Create the app release before attaching an APK (apk=attach/only)."; exit 1
          fi
          gh release upload "$tag" "$apk" --repo "$GITHUB_REPOSITORY" --clobber
          # Ensure the sideload/signing caveat is in the release body so downloaders see it (idempotent).
          note="> **Sideload APK:** \`${apk}\` is a universal Android build signed with the EAS upload key, **not** Google's Play app-signing key. It cannot update over (or be updated by) a Play Store install — it is a separate install track."
          body="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq '.body')"
          if ! printf '%s' "$body" | grep -q "Sideload APK:"; then
            printf '%s\n\n%s\n' "$body" "$note" | gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --notes-file -
          fi
          echo "Uploaded ${apk} to release ${tag}"
