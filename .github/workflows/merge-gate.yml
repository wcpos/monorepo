name: Merge Gate

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: read

jobs:
  merge-gate:
    name: "✅ Merge Gate"
    runs-on: ubuntu-latest
    steps:
      # Trusted-base pattern (mirrors wcpos/woocommerce-pos): check out the
      # DEFAULT branch's scripts, never the PR's — a PR must not be able to
      # edit the policy that judges it. Fix bots push to PR branches by
      # design, so the gate cannot live in a PR-editable workflow.
      - name: Checkout trusted base scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Evaluate merge policy
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_GATE_REQUIRED_CHECKS: 🧹 Lint|🧪 Unit Tests
        run: .github/scripts/merge-gate.sh
