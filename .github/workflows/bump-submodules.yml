name: Bump Submodules

on:
  schedule:
    # Daily at 06:00 UTC — quiet window, low chance of clashing with
    # active development pushes.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bump:
    # Gate the whole job to main so a non-main workflow_dispatch can't
    # publish arbitrary branch state to main via the push step below.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Serialize overlapping runs (cron + manual dispatch) so they don't
    # race at push time and fail with non-fast-forward errors.
    concurrency:
      group: bump-submodules-main
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v2
        with:
          app-id: ${{ secrets.WCPOS_BOT_APP_ID }}
          private-key: ${{ secrets.WCPOS_BOT_PRIVATE_KEY }}
          owner: wcpos
          repositories: |
            monorepo

      - name: Checkout monorepo (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pin to main — belt-and-braces with the job-level `if` above.
          ref: refs/heads/main
          submodules: true
          fetch-depth: 0
          # Push with the App token so CI workflows run on the bump commit
          # (pushes made with the default GITHUB_TOKEN don't trigger them).
          token: ${{ steps.app-token.outputs.token }}

      - name: Update submodules to latest remote main
        id: bump
        run: |
          set -euo pipefail

          # apps/electron tracks `main` per .gitmodules.
          git submodule update --remote --checkout apps/electron

          git add apps/electron
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No submodule updates."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "electron_sha=$(git -C apps/electron rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.bump.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(submodules): bump apps/electron @ ${{ steps.bump.outputs.electron_sha }}"
          # If main advanced between checkout and push (e.g. another
          # workflow merged a PR), rebase onto it so the push is a
          # fast-forward rather than rejected as non-ff.
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
