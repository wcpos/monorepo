packages:
  - "apps/*"
  - "packages/*"
nodeLinker: hoisted
preferSymlinkedExecutables: false
minimumReleaseAge: 1440
blockExoticSubdeps: true
minimumReleaseAgeIgnoreMissingTime: true
minimumReleaseAgeStrict: false
minimumReleaseAgeExclude:
  - react-native-svg
  - react-native
  - "@react-native/assets-registry"
  - "@react-native/babel-plugin-codegen"
  - "@react-native/babel-preset"
  - "@react-native/codegen"
  - "@react-native/community-cli-plugin"
  - "@react-native/debugger-frontend"
  - "@react-native/debugger-shell"
  - "@react-native/dev-middleware"
  - "@react-native/gradle-plugin"
  - "@react-native/js-polyfills"
  - "@react-native/metro-config"
  - "@react-native/normalize-colors"
  - "@react-native/virtualized-lists"
  - "@expo/config-types"
overrides:
  "expo": "~57.0.8"
  "@expo/dom-webview": "57.0.1"
  "lightningcss": "1.30.1"
  "uniwind": "npm:uniwind-pro@1.3.0"
  "react": "19.2.3"
  "react-dom": "19.2.3"
  "react-native": "0.86.0"
  "react-native-edge-to-edge": "^1.6.2"
  "react-native-gesture-handler": "~2.32.0"
  "react-native-safe-area-context": "~5.7.0"
  "@electron/node-gyp": "10.2.0-electron.2"
  "tar": "^7.5.11"
  "react-native-nitro-modules": "0.35.9"
  # jest-expo 57 pulls jest-environment-* 29 (nested jest-mock 29 lacks clearMocksOnScope);
  # force them to 30 so the jest-30 workspace packages get a consistent test environment.
  "jest-environment-jsdom": "^30.4.1"
  "jest-environment-node": "^30.4.1"
  # concurrently@9.2.1 (apps/electron devDep) pins shell-quote 1.8.3 exactly — force the
  # patched release (GHSA-w7jw-789q-3m8p, critical).
  "shell-quote": ">=1.8.4"
  # external-editor@3.1.0 pins vulnerable tmp 0.0.33 — force the patched current release
  # (GHSA-ph9p-34f9-6g65, high).
  "external-editor@3.1.0>tmp": "0.2.7"
allowBuilds:
  "@firebase/util": false
  "@serialport/bindings-cpp": true
  "@shopify/react-native-skia": true
  "@tailwindcss/oxide": true
  "@zowe/secrets-for-zowe-sdk": true
  "better-sqlite3": true
  "core-js": true
  "eccrypto": false
  "electron": true
  "electron-winstaller": false
  "esbuild": true
  "fs-xattr": true
  "keccak": true
  "macos-alias": true
  "msgpackr-extract": false
  "protobufjs": true
  "react-native-esc-pos-printer": true
  "rxdb": true
  "rxdb-premium": true
  "secp256k1": true
  "uniwind-pro": true
  "unrs-resolver": true
  usb: true
patchedDependencies:
  "react-native-esc-pos-printer@4.5.0": "patches/react-native-esc-pos-printer@4.5.0.patch"
